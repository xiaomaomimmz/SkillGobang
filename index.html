<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技能五子棋 - 15x15 侧边播报版</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="game-container">
        <main class="main-layout">
            <!-- 左侧：玩家子祺 -->
            <aside class="side-panel left-panel">
                <div class="player black active" id="player-ziqi">
                    <div class="avatar">子</div>
                    <div class="player-name">子祺</div>
                    <div class="player-tag">执黑棋</div>
                </div>
                <div class="stats-card">
                    <div class="stat-item">连胜: <span id="win-streak">0</span></div>
                </div>
                <div class="controls-vertical">
                    <button id="restart-btn" class="btn">重新开局</button>
                    <button id="bgm-btn" class="btn secondary">🎵 开启音乐</button>
                    <button id="fullscreen-btn" class="btn secondary">📺 全屏模式</button>
                </div>
            </aside>

            <!-- 中间：棋盘 -->
            <section class="board-area">
                <div id="board-viewport" class="board-viewport">
                    <div id="board-container" class="board-container">
                        <div id="board" class="board"></div>
                    </div>
                </div>
            </section>

            <!-- 右侧：技能五与旁白日志 -->
            <aside class="side-panel right-panel">
                <div class="player white" id="player-jinengwu">
                    <div class="avatar">五</div>
                    <div class="player-name">技能五</div>
                    <div class="player-tag">执白棋</div>
                </div>

                <div class="narrator-log-wrapper">
                    <h3>🎬 张呈说：</h3>
                    <div id="narrator-log" class="narrator-log">
                        <div class="log-entry system">系统：正在载入 15x15 剧场...</div>
                    </div>
                </div>
            </aside>
        </main>
    </div>


    <!-- 背景音乐 -->
    <audio id="bgm" src="music/jinengwuziqi_chenbufan.mp3" loop autoplay></audio>

    <script src="script.js"></script>
</body>

</html>
